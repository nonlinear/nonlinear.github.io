<!doctype html>
<html lang="en" class="revealjs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>{{ .Title }}</title>

  {{ $options := dict "outputStyle" "compressed" "enableSourceMap" true }}
  {{ $mainStyle := resources.Get "css/main.scss" | css.Sass $options | fingerprint }}
  {{ $slideStyle := resources.Get "css/slide.scss" | css.Sass $options | fingerprint }}

  <link rel="stylesheet" href="{{ $mainStyle.RelPermalink }}" />

  <link rel="stylesheet" href="/css/reveal/reveal.css" />
  <link rel="stylesheet" href="{{ $slideStyle.RelPermalink }}" />

  <script src="/js/global/mermaid.min.js"></script>
</head>
<body class="layout-slide reveal-page">
  <div class="reveal">
    <div class="slides">
      <section data-markdown data-separator="^\n---\n" data-separator-vertical="^\n--\n" data-separator-notes="^Note:">
        <textarea data-template id="slide-raw"></textarea>
      </section>
    </div>
  </div>

  <div class="slide-actions" aria-label="Slide actions">
    <button type="button" class="slide-action-btn" id="btn-fullscreen" aria-label="Toggle fullscreen">Fullscreen</button>
    <button type="button" class="slide-action-btn" id="btn-print-pdf" aria-label="Open print PDF view">PDF</button>
  </div>

  <script>
    // UTF-8 safe base64 decode (atob returns Latin1 bytes)
    (function() {
      const b64 = "{{ .RawContent | base64Encode }}";
      const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      const raw = new TextDecoder().decode(bytes);
      const markdownWithMermaidHtml = raw.replace(
        /```mermaid\r?\n([\s\S]*?)\r?\n```/g,
        (_, code) => `<div class="mermaid">\n${code}\n</div>`
      );
      document.getElementById('slide-raw').textContent = markdownWithMermaidHtml;
    })();
  </script>

  <script src="/js/reveal/reveal.js"></script>
  <script src="/js/reveal/plugin/markdown/markdown.js"></script>
  <script src="/js/reveal/plugin/highlight/highlight.js"></script>
  <script src="/js/reveal/plugin/notes/notes.js"></script>
  <script src="/js/vendor/screenfull.js"></script>
  <script>
    Reveal.initialize({
      hash: true,
      transition: 'fade',
      plugins: [ RevealMarkdown, RevealHighlight, RevealNotes ]
    });

    (function() {
      const fsBtn = document.getElementById('btn-fullscreen');
      const pdfBtn = document.getElementById('btn-print-pdf');

      if (fsBtn) {
        fsBtn.addEventListener('click', async function() {
          const target = document.documentElement;

          if (window.screenfull && window.screenfull.isEnabled) {
            try {
              if (window.screenfull.isFullscreen) {
                await window.screenfull.exit();
              } else {
                await window.screenfull.request(target);
              }
              return;
            } catch (err) {
              // Fall through to native API if screenfull throws.
            }
          }

          // Native fallback when screenfull is unavailable or rejected.
          if (!document.fullscreenElement && target.requestFullscreen) {
            target.requestFullscreen();
          } else if (document.exitFullscreen) {
            document.exitFullscreen();
          }
        });
      }

      if (pdfBtn) {
        pdfBtn.addEventListener('click', function() {
          const url = new URL(window.location.href);
          url.searchParams.set('print-pdf', '');
          window.open(url.toString(), '_blank', 'noopener');
        });
      }
    })();

    Reveal.on('ready', function() {
      mermaid.initialize({
        startOnLoad: false,
        theme: 'forest',
        flowchart: { curve: 'natural' }
      });
      mermaid.run({ querySelector: '.mermaid' });
    });
  </script>
</body>
</html>
